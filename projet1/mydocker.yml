#cloud-config

# Mettre le bon timezone
timezone: Europe/Paris

# Créer un utilisateur (ubuntu)
users:
- name: ubuntu
  gecos: Ubuntu User
  shell: /bin/bash
  home: /home/ubuntu
  groups: users,admin,wheel,lxd,docker
  sudo: ALL=(ALL) NOPASSWD:ALL

# Update et upgrade
package_update: true
package_upgrade: true

# Installation des packages nécessaire
packages:
  - apt-transport-https
  - bash-completion
  - ca-certificates
  - curl
  - git

runcmd:
  # Connexion avec mdp via vscode
  - sudo sed -i 's/no/Yes/g' /etc/ssh/sshd_config.d/60-cloudimg-settings.conf
  - sudo service ssh restart
  - echo 'ubuntu:soso' | chpasswd
  # Installation de Docker
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | apt-key add -
  - add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
  - apt-get update && apt-get install -y docker-ce docker-ce-cli containerd.io
  - systemctl start docker
  - systemctl enable docker

# Installation de l'autocompletion
write_files:
- path: /home/ubuntu/.bashrc
  defer: true
  append: true
  owner: ubuntu:ubuntu
  content: |
    if command -v minikube &>/dev/null
    then
      eval "$(minikube completion bash)"
    fi
    source /etc/bash_completion
    source <(minikube completion bash)
    alias kubectl="minikube kubectl --"
    alias k="minikube kubectl --"
    alias k="kubectl"
    complete -F __start_kubectl k
    source <(kubectl completion bash)
  permissions: '0644'
- path: /etc/update-motd.d/99-system-info
  content: |
    #!/bin/bash
    echo "

    ░░░░░░░░░░░░░░░░░
    ░░░▄░▀▄░░░▄▀░▄░░░
    ░░░█▄███████▄█░░░
    ░░░███▄███▄███░░░
    ░░░▀█████████▀░░░
    ░░░░▄▀░░░░░▀▄░░░░
    ░░░░░░░░░░░░░░░░░
     █████╗ ██████╗ ██╗
    ██╔══██╗██╔══██╗██║
    ███████║██████╔╝██║
    ██╔══██║██╔══██╗██║
    ██║  ██║██████╔╝██║
    ╚═╝  ╚═╝╚═════╝ ╚═╝

    Serveur déployé avec ♥️ par https://ab-agency.net/abi

    "
    OS_VERSION=$(grep -E '^PRETTY_NAME=' /etc/os-release | cut -d= -f2 | tr -d '"')
    CPU_LOAD=$(uptime | awk -F'load average:' '{ print $2 }')
    MEMORY_USAGE=$(free -h | awk '/Mem:/ {print $3 "/" $2}')
    DISK_USAGE=$(df -h --output=used,size / | tail -n 1 | awk '{print $1 "/" $2}')
    NETWORK_INTERFACES=$(ip -br link show | awk '{print $1}' | grep -v lo)
    IP_ADDRESS=$(ip -o -c -4 addr list | awk -F ' *|/' '{print $4}')

    echo "Bienvenue dans ton serveur cloud 👋🏻"
    echo ""
    echo "Quelques infos sur ton serveur :"
    echo "  - CPU Load: $CPU_LOAD"
    echo "  - Memory Usage: $MEMORY_USAGE"
    echo "  - Disk Usage: $DISK_USAGE"
    echo "  - Network Interfaces: $NETWORK_INTERFACES"
    echo "  - Ip address : $IP_ADDRESS"

    echo -e "\nBon développement 👨🏻‍💻\n"
  permissions: "0755"

final_message: |
  cloud-init has finished
  version: $version
  timestamp: $timestamp
  datasource: $datasource
  uptime: $uptime
 
