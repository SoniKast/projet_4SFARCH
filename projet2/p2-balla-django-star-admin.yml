apiVersion: v1
kind: Service
metadata:
  name: django-star-admin-svc-b
  labels:
    app: django-star-admin-svc-b
  namespace: prodv2-b-05-03-2026
spec:
  type: NodePort
  selector:
    app: django-star-admin-b-05-03-2026
  ports:
  - port: 5005
    protocol: TCP
    targetPort: 5005
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: django-star-admin-b-05-03-2026
  labels:
    app: django-star-admin-b-05-03-2026
  namespace: prodv2-b-05-03-2026
spec:
  replicas: 3
  selector:
    matchLabels:
      app: django-star-admin-b-05-03-2026
  template:
    metadata:
      labels:
        app: django-star-admin-b-05-03-2026
    spec:
      containers:
      - name: django-star-admin-b-05-03-2026
        imagePullPolicy: IfNotPresent
        image: sonikast1/django-star-admin:v2
        ports:
        - containerPort: 5005